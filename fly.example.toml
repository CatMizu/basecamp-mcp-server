# Template Fly.io config. Copy to fly.toml and fill in `app` + the volume
# source name before deploying. fly.toml is gitignored so the production
# hostname isn't published.

app = "<your-fly-app-name>"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3232
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "<your-fly-volume-name>"
  destination = "/data"
  initial_size = "1gb"

app = "basecamp-mcp-server"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3232
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "basecamp_mcp_server_data"
  destination = "/data"
  initial_size = "1gb"
